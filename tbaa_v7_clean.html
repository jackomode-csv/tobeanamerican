<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T/B/AA — To Be An American</title>
<style>
  * { hyphens: none !important; -webkit-hyphens: none !important; }
  @font-face {
    font-family: 'FranklinGothic';
    src: url('tbaa_assets/fonts/FranklinGothic.ttf') format('truetype');
    font-weight: 400; font-style: normal;
  }
  @font-face {
    font-family: 'FranklinGothic';
    src: url('tbaa_assets/fonts/FranklinGothic_2.ttf') format('truetype');
    font-weight: 400; font-style: italic;
  }
  @font-face {
    font-family: 'FranklinGothicCondensed';
    src: url('tbaa_assets/fonts/FranklinGothicCondensed.ttf') format('truetype');
    font-weight: 400; font-style: normal;
  }
  @font-face {
    font-family: 'FranklinGothicHeavy';
    src: url('tbaa_assets/fonts/FranklinGothicHeavy.ttf') format('truetype');
    font-weight: 400; font-style: normal;
  }

  :root {
    --green: #1a6b2a;
    --black: #0a0a0a;
    --white: #ffffff;
    --nav-width: 36px;
    --font-display: 'FranklinGothicHeavy', 'FranklinGothic', sans-serif;
    --font-body: 'FranklinGothic', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--white); font-family: var(--font-body); cursor: default; }

  /* ── SCREENS ── */
  .screen { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 1; }
  .screen.active { opacity: 1; pointer-events: all; z-index: 10; }

  /* ── LOGO ── */
  .logo {
    position: absolute; top: 20px; left: 20px;
    font-family: var(--font-display);
    font-size: 38px; letter-spacing: 1px; line-height: 1;
    cursor: pointer; z-index: 100; user-select: none;
  }
  .logo .t, .logo .slash { color: var(--green); }
  .logo .b, .logo .aa { color: var(--black); }

  /* ── HOME ── */
  #home { background: var(--white); }

  .home-map-bg {
    position: absolute; inset: 0;
    background: url('tbaa_assets/images/img_001.png') center/cover no-repeat;
    opacity: 0.15;
    pointer-events: none;
  }

  .home-title {
    position: absolute; top: 70px; left: 40px;
    font-family: var(--font-display);
    font-size: clamp(64px, 10vw, 128px);
    line-height: 0.88; z-index: 20;
    animation: fadeUp 0.7s ease forwards;
  }
  .home-title .line-green { color: var(--green); display: block; }
  .home-title .line-black { color: var(--black); display: block; }

  .home-enter {
    position: absolute; top: 50%; left: 0; right: 0;
    transform: translateY(-50%);
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 100px);
    color: var(--black); background: none; border: none;
    cursor: pointer; letter-spacing: 3px;
    transition: color 0.2s; text-decoration: none;
    animation: fadeUp 0.7s 0.15s ease both;
    text-align: center; width: 100%;
    z-index: 20;
  }
  .home-enter:hover { color: var(--green); }

  .home-desc {
    position: absolute; bottom: 56px; right: 56px;
    max-width: 40%; font-size: clamp(14px, 2vh, 22px); line-height: 1.75;
    color: #555; text-align: center; z-index: 20;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  /* MAP */
  #map-screen { background: var(--white); }

  .map-img-wrapper {
    position: absolute; inset: 0; overflow: hidden;
  }
  .map-img-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .map-img-inner > img {
    width: 100%; height: 100%;
    display: block;
  }
  .map-overlay {
    position: absolute; cursor: pointer;
    transition: filter 0.2s, opacity 0.2s;
    mix-blend-mode: screen;
  }
  .map-overlay img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .map-overlay:hover { filter: brightness(1.15); }

  /* ── SECTION SCREEN ── */
  #section-screen { background: var(--white); display: flex; flex-direction: column; }

  .half-map {
    position: relative; height: 46vh; flex-shrink: 0; overflow: hidden;
  }
  .half-map-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center;
  }
  .half-map-overlay {
    position: absolute; pointer-events: none;
    mix-blend-mode: multiply;
  }
  .half-map-overlay img { width: 100%; height: 100%; object-fit: contain; }
  .half-map-fade {
    position: absolute; bottom: 0; left: 0; right: 0; height: 75%;
    background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.6) 40%, rgba(255,255,255,0.92) 65%, #ffffff 100%);
    pointer-events: none;
  }

  /* Toggle */
  .view-toggle {
    position: absolute; top: 20px; right: 20px; z-index: 100;
    background: none; border: none; cursor: pointer; padding: 6px;
  }
  .toggle-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 26px; height: 26px;
  }
  .toggle-grid .cell { background: var(--black); }
  .toggle-lines { display: flex; flex-direction: column; gap: 3px; width: 22px; }
  .toggle-lines .lbar { height: 2px; background: var(--black); }

  /* Section title at base of half map */
  .section-title-base {
    position: absolute; bottom: 52px; left: 60px;
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 54px);
    color: var(--black); line-height: 1; z-index: 20;
  }
  .name-dash {
    display: inline-block; width: 22px; height: 3px;
    background: var(--black); margin-right: 10px; vertical-align: middle;
  }

  /* ── LIST VIEW ── */
  #list-view { flex: 1; overflow-y: auto; padding: 0 20px 40px 60px; display: none; }
  #list-view.visible { display: block; }

  .list-president {
    display: flex; align-items: flex-end; gap: 20px;
    padding: 20px 0; border-bottom: 1px solid #eee;
    cursor: pointer; transition: opacity 0.18s;
  }
  .list-president:hover { opacity: 0.6; }
  .list-portrait-wrap {
    width: 110px; height: 110px; flex-shrink: 0; overflow: hidden; background: #ddd;
  }
  .list-portrait-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .list-name {
    font-family: var(--font-display);
    font-size: clamp(30px, 3.5vw, 52px); line-height: 1; color: var(--black);
  }
  .list-meta { font-size: 10px; color: #888; margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── SINGLE VIEW ── */
  #single-view { position:absolute; inset:0; overflow:hidden; display:none; z-index:20; }
  #single-view.visible { display:block; }

  .single-scroll { height: 100%; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
  .single-scroll::-webkit-scrollbar { display: none; }

  .single-name-sticky {
    position: sticky; top: 70px; z-index: 50; padding: 0 60px 0 60px;
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none;
  }
  .single-name-text-wrap {
    display: inline-block;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(4px);
    padding: 6px 12px 6px 0;
    pointer-events: all;
  }
  .single-name-text {
    font-family: var(--font-display);
    font-size: clamp(26px, 3vw, 44px); color: var(--black); line-height: 1;
  }
  .single-term { font-size: clamp(13px, 1.5vw, 22px); color: #aaa; letter-spacing: 1px; }

  .president-section { padding: 32px 0 120px 0; }

  /* Sticky wrapper: portrait + cards locked together */
  .pres-stage {
    position: sticky;
    top: 140px;
    width: clamp(320px, 52%, 560px);
    margin: 0 auto;
    aspect-ratio: 3/4;
    z-index: 30;
  }
  .portrait-container {
    position: absolute;
    inset: 0;
    background: #ccc;
    overflow: hidden;
    z-index: 30;
  }
  .portrait-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: filter 1.4s ease;
  }
  .portrait-placeholder {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: linear-gradient(135deg, #ccc, #e0e0e0);
    font-family: var(--font-display); font-size: 48px; color: #999; letter-spacing: 4px;
  }
  .quality-full     { filter: none; }
  .quality-neutral  { filter: blur(1.5px) contrast(0.88); }
  .quality-negative { filter: blur(3.5px) contrast(0.72) brightness(0.88); }
  .quality-extreme  { filter: blur(7px) contrast(0.55) brightness(0.75) grayscale(0.5); }

  /* Card panel: sticky, JS aligns its midpoint to portrait midpoint */
  .card-panel {
    position: sticky;
    top: 200px; /* overridden by JS */
    z-index: 40;
    width: min(97vw, 1900px);
    margin: 60px auto 80px auto;
  }
  .card-track-outer {
    position: relative;
    width: 100%;
  }
  .card-track-inner {
    display: flex; align-items: stretch;
    gap: 16px;
  }
  .story-card {
    flex: 1; min-width: 0;
    min-height: clamp(200px, 32vw, 420px);
    background: rgba(255,255,255,0.60);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
    padding: 5% 3%;
    box-sizing: border-box;
  }
  .story-headline {
    font-family: 'FranklinGothicCondensed', 'FranklinGothic', sans-serif;
    font-size: clamp(18px, 3.5vw, 42px);
    line-height: 1.08;
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
    width: 100%;
  }
  .story-card[style*="cursor:pointer"]:hover {
    background: rgba(240,240,235,0.65);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    transform: translateY(-2px);
    transition: all 0.15s ease;
  }
  .smeta-link {
    grid-column: 1 / -1;
    text-align: center;
    font-family: 'FranklinGothic', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.45;
    margin-top: 4px;
  }
  .story-card[style*="cursor:pointer"]:hover .smeta-link {
    opacity: 0.9;
  }
  .story-body { display: none; }
  .story-meta-bottom {
    padding-top: 6%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    row-gap: 2px;
    width: 100%;
    text-align: center;
  }
  .smeta-source {
    grid-column: 1 / -1;
    text-align: center;
    font-family: 'FranklinGothic', sans-serif;
    font-style: italic;
    font-size: clamp(9px, 1.1vw, 13px);
    color: #aaa;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .smeta-date {
    font-family: 'FranklinGothic', sans-serif;
    font-style: italic;
    font-size: clamp(9px, 1.1vw, 13px);
    color: #bbb;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .smeta-page {
    font-family: 'FranklinGothic', sans-serif;
    font-style: italic;
    font-size: clamp(9px, 1.1vw, 13px);
    color: #bbb;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .card-nav-row {
    display: none;
  }
  .story-nav-btn {
    font-family: var(--font-display); font-size: 36px; background: none;
    border: none; cursor: pointer; color: var(--black); line-height: 1;
    transition: color 0.15s, transform 0.15s; user-select: none;
    pointer-events: all;
    width: 40px; text-align: center;
  }
  .story-nav-btn:hover { color: var(--green); transform: scale(1.2); }
  .story-indicator {
    font-size: 9px; letter-spacing: 2px; color: #aaa; text-transform: uppercase;
    text-align: center; white-space: nowrap;
  }

  /* President transition */
  .pres-transition {
    height: 72px; display: flex; align-items: center; padding: 0 60px;
    border-top: 1px solid #eee; cursor: pointer; transition: background 0.2s;
  }
  .pres-transition:hover { background: #f6f6f6; }
  .pres-transition .t-arrow {
    font-family: var(--font-body); font-size: 11px; letter-spacing: 3px;
    color: #aaa; text-transform: uppercase; margin-right: 16px;
  }
  .pres-transition .t-name {
    font-family: var(--font-display); font-size: 30px; color: var(--black);
  }
  .pres-transition.end { cursor: default; }
  .pres-transition.end .t-arrow { color: #ddd; }

  /* ── LEFT NAV BAR ── */
  .nav-bar {
    position: fixed; left: 0; top: 130px; bottom: 40px;
    width: var(--nav-width); z-index: 200;
    display: flex; flex-direction: column; justify-content: center;
    align-items: flex-start; padding-left: 8px;
  }
  .nav-tick {
    position: relative; display: flex; align-items: center;
    cursor: pointer; padding: 2.5px 0; width: 100%;
  }
  .tick-line {
    width: 12px; height: 2px; background: var(--black);
    transition: width 0.15s, background 0.15s; flex-shrink: 0;
  }
  .nav-tick:hover .tick-line, .nav-tick.active .tick-line {
    width: 20px; background: var(--green);
  }
  .tick-label {
    position: absolute; left: 26px; white-space: nowrap;
    font-family: var(--font-display); font-size: 13px; letter-spacing: 1px;
    color: var(--black); background: var(--white); padding: 2px 6px;
    pointer-events: none; opacity: 0; transform: translateX(-4px);
    transition: opacity 0.15s, transform 0.15s;
  }
  .nav-tick:hover .tick-label { opacity: 1; transform: translateX(0); }

  /*  RIGHT RULER  */
  .scroll-ruler {
    position: fixed; right: 6px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 2px; z-index: 100; pointer-events: none;
  }
  .ruler-tick { width: 10px; height: 2px; background: var(--black); opacity: 0.1; transition: opacity 0.3s; }
  .ruler-tick.lit { opacity: 0.75; }

  /* ── DATA SCREEN ── */
  #data-screen { background: var(--white); display: flex; flex-direction: column; }

  .data-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(6px);
    padding: 20px 60px 16px 60px;
    display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid #eee;
  }
  .data-header .logo { position: static; }
  .data-section-title {
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 32px);
    color: var(--black); letter-spacing: 1px; text-transform: uppercase;
  }
  .data-era-nav {
    display: flex; gap: 8px; margin-left: auto;
  }
  .data-era-btn {
    font-family: var(--font-display); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black); background: none; border: 1px solid #ccc;
    padding: 6px 16px; cursor: pointer; transition: all 0.15s;
  }
  .data-era-btn:hover { border-color: var(--green); color: var(--green); }

  /* Era filter buttons inside section-chrome (mirrors data-era-btn) */
  .section-era-nav {
    position: absolute; top: 22px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 1; pointer-events: all;
  }
  .section-era-btn {
    font-family: var(--font-display); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black); background: rgba(255,255,255,0.85);
    border: 1px solid #ccc;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  .section-era-btn:hover { border-color: var(--green); color: var(--green); }
  .section-era-btn.active {
    background: var(--black); color: var(--white); border-color: var(--black);
  }
  @media (max-width: 700px) {
    .section-era-nav { gap: 3px; top: 56px; }
    .section-era-btn { font-size: 9px; padding: 4px 8px; letter-spacing: 1px; }
  }

  .data-back-btn {
    font-family: var(--font-display); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black); background: none; border: 1px solid #ccc;
    padding: 6px 16px; cursor: pointer; transition: all 0.15s;
  }
  .data-back-btn:hover { border-color: var(--green); color: var(--green); }

  .data-scroll {
    flex: 1; overflow-y: auto; scrollbar-width: none;
    padding: 0 60px 80px 60px;
  }
  .data-scroll::-webkit-scrollbar { display: none; }

  .data-pres-group { margin-top: 40px; }
  .data-pres-name {
    font-family: var(--font-display);
    font-size: clamp(20px, 2.5vw, 34px);
    color: var(--black); margin-bottom: 4px;
  }
  .data-pres-term {
    font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .data-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .data-cards-grid .story-card {
    min-height: 220px;
    background: rgba(245,245,242,0.7);
    border: 1px solid #e8e8e5;
  }

  .data-card-tag {
    font-family: var(--font-display); font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--green); margin-bottom: 8px; width: 100%;
  }

  /* DATA button next to toggle */
  .data-btn {
    font-family: var(--font-display); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black); background: none; border: 1px solid #ccc;
    padding: 4px 12px; cursor: pointer; transition: all 0.15s;
    pointer-events: all;
  }
  .data-btn:hover { border-color: var(--green); color: var(--green); }

  @media (max-width: 768px) {
    .data-header { padding: 14px 14px 12px 14px; gap: 10px; }
    .data-scroll { padding: 0 14px 80px 14px; }
    .data-cards-grid { grid-template-columns: 1fr; }
    .data-section-title { font-size: clamp(14px, 5vw, 22px); }
    .data-era-nav { gap: 4px; }
    .data-era-btn { font-size: 9px; padding: 4px 8px; letter-spacing: 1px; }
  }

  /* ── DETAIL SCREEN ── */
  #detail-screen { background: var(--white); display: flex; flex-direction: column; }
  .detail-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(6px);
    padding: 20px 60px; display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid #eee;
  }
  .detail-header .logo { position: static; }
  .detail-back-btn {
    font-family: var(--font-display); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black); background: none; border: 1px solid #ccc;
    padding: 6px 16px; cursor: pointer; transition: all 0.15s;
  }
  .detail-back-btn:hover { border-color: var(--green); color: var(--green); }
  .detail-scroll {
    flex: 1; overflow-y: auto; scrollbar-width: none;
    padding: 40px 60px 80px; max-width: 1200px; margin: 0 auto; width: 100%;
  }
  .detail-scroll::-webkit-scrollbar { display: none; }
  .detail-valence {
    font-family: var(--font-display); font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
  }
  .detail-valence.val-positive { color: var(--green); }
  .detail-valence.val-negative { color: #c0392b; }
  .detail-valence.val-neutral, .detail-valence.val-sotu { color: #888; }
  .detail-doc-title {
    font-family: var(--font-display);
    font-size: clamp(18px, 2.5vw, 28px); line-height: 1.15;
    color: var(--black); margin-bottom: 10px;
  }
  .detail-president { font-size: 18px; color: #888; letter-spacing: 1px; margin-bottom: 28px; }
  .detail-excerpt {
    border-left: 4px solid var(--green); padding: 32px 32px;
    margin: 36px 0; font-style: italic; font-size: clamp(28px, 4vw, 42px);
    line-height: 1.35; color: #222; background: #fafaf8;
  }
  .detail-meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 32px; padding: 20px; background: #f8f8f6; border: 1px solid #eee;
  }
  .detail-meta-item label {
    display: block; font-family: var(--font-display); font-size: 12px;
    letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin-bottom: 4px;
  }
  .detail-meta-item span { font-size: 16px; color: var(--black); line-height: 1.5; display: block; }
  .detail-section-heading {
    font-family: var(--font-display); font-size: 15px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--black); margin: 28px 0 10px;
  }
  .detail-text { font-size: 18px; line-height: 1.65; color: #444; margin-bottom: 18px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; }
  .detail-tag {
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 12px; background: #f0f0ed; border: 1px solid #e0e0dd; color: #666;
  }
  .detail-source-link {
    display: inline-block; margin-top: 28px;
    font-family: var(--font-display); font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--green); text-decoration: none;
    border: 1px solid var(--green); padding: 8px 20px; transition: all 0.15s;
  }
  .detail-source-link:hover { background: var(--green); color: var(--white); }

  @media (max-width: 768px) {
    .detail-header { padding: 14px 14px 12px 14px; gap: 10px; }
    .detail-scroll { padding: 20px 14px 80px; }
    .detail-meta-grid { grid-template-columns: 1fr; }
  }

  /*  ANIM  */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /*  MOBILE  */
  @media (max-width: 768px) {
    :root { --nav-width: 0px; }

    /*  Bottom tick nav bar  */

const PRESIDENTS = {
  whitehouse:   PRESIDENTS_LIST,
  peoplespark: PEOPLES_PARK_LIST,
};

// ── STATE ──
let currentSection = 'whitehouse';
let currentView = 'single';
let currentPresidentIndex = 0;
let currentEraFilter = 'all'; // 'all' | 'beginning' | 'middle' | 'end'

// Returns a president's story cards, sorted by date and sliced into the
// active era third (early/mid/late term coverage). Each returned story
// keeps its original index in p.stories under _origIdx so click handlers
// can still resolve back to the unfiltered story.
function getActiveStories(p) {
  if (!p || !p.stories) return [];
  const sorted = p.stories
    .map((s, origIdx) => Object.assign({}, s, { _origIdx: origIdx }))
    .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  if (!currentEraFilter || currentEraFilter === 'all') return sorted;
  const total = sorted.length;
  if (total === 0) return [];
  const beginEnd = Math.ceil(total / 3);
  const midEnd   = Math.ceil(2 * total / 3);
  if (currentEraFilter === 'beginning') return sorted.slice(0, beginEnd);
  if (currentEraFilter === 'middle')    return sorted.slice(beginEnd, midEnd);
  if (currentEraFilter === 'end')       return sorted.slice(midEnd);
  return sorted;
}

// Returns presidents that still have at least one story under the current era filter.
function getActivePresidents(sectionId) {
  const all = PRESIDENTS[sectionId || currentSection] || [];
  if (!currentEraFilter || currentEraFilter === 'all') return all;
  return all.filter(p => getActiveStories(p).length > 0);
}

function setEraFilter(era) {
  currentEraFilter = era;
  // Update button highlighting
  document.querySelectorAll('#section-era-nav .section-era-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.era === era);
  });
  // Reset position and re-render the current view
  currentPresidentIndex = 0;
  buildNavBar(currentSection);
  if (currentView === 'list') {
    renderListView(currentSection);
  } else {
    renderSingleView(currentSection, 0);
  }
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showScreen('home');
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('scroll-ruler').style.display = 'none';
  document.getElementById('section-chrome').style.display = 'none';
}

function goToMap() {
  showScreen('map-screen');
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('scroll-ruler').style.display = 'none';
  document.getElementById('section-chrome').style.display = 'none';
  setTimeout(fitMapInner, 50);
}

function goToSection(sectionId) {
  currentSection = sectionId;
  currentPresidentIndex = 0;
  // Reset era filter when entering a section
  currentEraFilter = 'all';
  document.querySelectorAll('#section-era-nav .section-era-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.era === 'all');
  });

  // Set half-map image
  document.getElementById('static-half-map').style.display = 'block';
  const halfMapImg = document.getElementById('half-map-img');
  if (sectionId === 'whitehouse') {
    halfMapImg.src = ASSET.whHalf;
    halfMapImg.style.objectPosition = 'center 30%';
  } else {
    halfMapImg.src = ASSET.ppHalf;
    halfMapImg.style.objectPosition = 'center top';
  }

  const activeFirst = getActivePresidents(sectionId)[0];
  const firstName = activeFirst ? activeFirst.name : '';
  const tn1 = document.getElementById('section-title-name'); if (tn1) tn1.textContent = firstName;

  buildNavBar(sectionId);
  buildScrollRuler();

  if (currentView === 'list') {
    renderListView(sectionId);
  } else {
    renderSingleView(sectionId, 0);
  }

  updateToggleIcon();
  showScreen('section-screen');
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('scroll-ruler').style.display = 'flex';
  document.getElementById('section-chrome').style.display = 'block';
}

// ── TOGGLE ──
function toggleView() {
  currentView = currentView === 'single' ? 'list' : 'single';
  updateToggleIcon();
  if (currentView === 'list') {
    renderListView(currentSection);
  } else {
    renderSingleView(currentSection, currentPresidentIndex);
  }
}

function updateToggleIcon() {
  const btn = document.getElementById('view-toggle');
  if (currentView === 'single') {
    btn.innerHTML = '<div class="toggle-lines">' + Array(4).fill('<div class="lbar"></div>').join('') + '</div>';
    btn.title = 'Switch to list view';
  } else {
    btn.innerHTML = '<div class="toggle-grid"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>';
    btn.title = 'Switch to single view';
  }
}

// ── LIST VIEW ──
function renderListView(sectionId) {
  document.getElementById('static-half-map').style.display = 'block';
  document.getElementById('list-view').classList.add('visible');
  document.getElementById('single-view').classList.remove('visible');
  const presidents = getActivePresidents(sectionId);
  const container = document.getElementById('list-content');
  container.innerHTML = '';
  presidents.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'list-president';
    el.innerHTML = `
      <div class="list-portrait-wrap">
        <img src="${PORTRAITS[p.name] || p.portraitUrl || ''}" alt="${p.name}" onerror="this.style.display='none'">
      </div>
      <div>
        <div class="list-name">${p.name}</div>
        <div class="list-meta">${p.termYears}</div>
      </div>`;
    el.onclick = () => {
      currentView = 'single';
      currentPresidentIndex = i;
      renderSingleView(sectionId, i);
      updateToggleIcon();
    };
    container.appendChild(el);
  });
}

// ── SINGLE VIEW ──
function renderSingleView(sectionId, presidentIndex) {
  document.getElementById('static-half-map').style.display = 'none';
  document.getElementById('single-view').classList.add('visible');
  document.getElementById('list-view').classList.remove('visible');
  currentPresidentIndex = presidentIndex;

  const presidents = getActivePresidents(sectionId);
  const content = document.getElementById('single-content');
  const mapSrc = document.getElementById('half-map-img').src;
  const mapPos = document.getElementById('half-map-img').style.objectPosition || 'center';
  content.innerHTML = '<div class="half-map" style="position:relative;height:46vh;flex-shrink:0;overflow:hidden;pointer-events:none;">'
    + '<img class="half-map-img" src="' + mapSrc + '" alt="Map" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:' + mapPos + ';" >'
    + '<div class="half-map-fade"></div>'
    + '</div>';

  presidents.forEach((p, i) => {
    const section = document.createElement('div');
    section.id = 'pres-' + i;
    section.className = 'president-section';
    section.innerHTML = buildPresidentHTML(p, i, presidents);
    content.appendChild(section);
  });

  const scroll = document.getElementById('single-scroll');
  scroll.scrollTop = 0;
  if (presidentIndex > 0) {
    setTimeout(() => {
      const t = document.getElementById('pres-' + presidentIndex);
      if (t) t.scrollIntoView({behavior:'smooth'});
    }, 80);
  }

  scroll.onscroll = () => onSingleScroll(scroll, presidents);
  setTimeout(() => onSingleScroll(scroll, presidents), 150);
  setTimeout(() => onSingleScroll(scroll, presidents), 600);


  updateNavHighlight(presidentIndex);
  updateRuler(scroll);
  setTimeout(alignCardPanels, 50);
}

function buildPresidentHTML(p, i, allPresidents) {
  const next = allPresidents[i + 1];
  const activeStories = getActiveStories(p);
  const cards = activeStories.map((s, si) => `
    <div class="story-card type-${s.type}" onclick="showDetailByIndex(${i}, ${s._origIdx})" style="cursor:pointer;">
      <div class="story-headline">${s.headline}</div>
      ${s.body ? `<div class="story-body">${s.body}</div>` : ''}
      <div class="story-meta-bottom">
        <div class="smeta-source">${s.source}</div>
        <div class="smeta-date">${s.date}</div>
        ${s.page ? `<div class="smeta-page">${s.page}</div>` : ''}
        <div class="smeta-link">Read More →</div>
      </div>
    </div>`).join('');

  const transition = '';

  return `
    <div class="single-name-sticky">
      <div class="single-name-text-wrap">
        <div class="single-name-text"><span class="name-dash"></span>${p.name}</div>
        <div class="single-term">${p.termYears}</div>
      </div>
    </div>
    <div class="pres-stage">
      <div class="portrait-container">
        <img src="${PORTRAITS[p.name] || PORTRAITS[PORTRAIT_ALIASES[p.name]] || ''}" alt="${p.name}"
             class="portrait-img quality-full" id="portrait-${i}"
             onerror="this.style.display='none';document.getElementById('ph-${i}').style.display='flex';">
        <div class="portrait-placeholder" id="ph-${i}" style="display:none;">
          ${p.name.split(' ').map(w=>w[0]).join('')}
        </div>
      </div>
    </div>
    <div class="card-panel">
      <div class="card-track-outer">
        <div class="card-track-inner" id="strip-${i}">${cards}</div>
      </div>
      <div class="card-nav-row">
        <button class="story-nav-btn" onclick="shiftStories(${i},-1)">−</button>
        <span class="story-indicator" id="ind-${i}">${activeStories.length ? '01' : '00'} / ${String(activeStories.length).padStart(2,'0')}</span>
        <button class="story-nav-btn" onclick="shiftStories(${i},1)">+</button>
      </div>
    </div>
    ${transition}`;
}

function shiftStories(presIdx, dir) {
  const p      = getActivePresidents(currentSection)[presIdx];
  const stories = getActiveStories(p);
  const strip  = document.getElementById('strip-' + presIdx);
  const indic  = document.getElementById('ind-' + presIdx);
  const portrait = document.getElementById('portrait-' + presIdx);
  if (!strip || stories.length === 0) return;

  const cardEl    = strip.parentElement;
  const cardWidth = cardEl ? cardEl.offsetWidth : 300;
  let offset = parseInt(strip.dataset.offset || 0);
  offset = Math.max(0, Math.min(offset + dir, stories.length - 1));
  strip.dataset.offset = offset;
  strip.style.transform = 'translateX(-' + (offset * cardWidth) + 'px)';

  if (indic) indic.textContent = String(offset+1).padStart(2,'0') + ' / ' + String(stories.length).padStart(2,'0');

  if (portrait) {
    const qualMap = { sotu:'quality-full', neutral:'quality-neutral', positive:'quality-neutral', negative:'quality-negative' };
    const storyType = stories[offset].type;
    portrait.className = 'portrait-img ' + (qualMap[storyType] || 'quality-full');
  }
}

function scrollToPresident(idx) {
  const t = document.getElementById('pres-' + idx);
  if (t) t.scrollIntoView({behavior:'smooth'});
}

function onSingleScroll(scrollEl, presidents) {
  const scrollTop = scrollEl.scrollTop;
  presidents.forEach((p, i) => {
    const sec = document.getElementById('pres-' + i);
    if (!sec) return;
    const secTop = sec.offsetTop;

    if (scrollTop >= secTop - 120) {
      currentPresidentIndex = i;
      const tn2 = document.getElementById('section-title-name'); if (tn2) tn2.textContent = p.name;
      updateNavHighlight(i);
    }


  });
  updateRuler(scrollEl);
}

// ── NAV BAR ──
function buildNavBar(sectionId) {
  const nav = document.getElementById('nav-bar');
  nav.innerHTML = '';
  getActivePresidents(sectionId).forEach((p, i) => {
    const tick = document.createElement('div');
    tick.className = 'nav-tick' + (i === 0 ? ' active' : '');
    tick.dataset.pi = i;
    tick.innerHTML = '<div class="tick-line"></div><span class="tick-label">' + p.name + '</span>';
    tick.onclick = () => {
      if (currentView === 'single') {
        scrollToPresident(i);
      } else {
        currentView = 'single';
        currentPresidentIndex = i;
        renderSingleView(currentSection, i);
        updateToggleIcon();
      }
    };
    nav.appendChild(tick);
  });
}

function updateNavHighlight(idx) {
  document.querySelectorAll('.nav-tick').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.pi) === idx);
  });
}

// ── RULER ──
function buildScrollRuler() {
  const ruler = document.getElementById('scroll-ruler');
  ruler.innerHTML = Array(36).fill('<div class="ruler-tick"></div>').join('');
}

function updateRuler(scrollEl) {
  const pct   = scrollEl.scrollTop / Math.max(1, scrollEl.scrollHeight - scrollEl.clientHeight);
  const ticks = document.querySelectorAll('.ruler-tick');
  const lit   = Math.round(pct * ticks.length);
  ticks.forEach((t, i) => t.classList.toggle('lit', i <= lit));
}

// ── Align card panels: card midpoint = portrait midpoint ──
function alignCardPanels() {
  document.querySelectorAll('.president-section').forEach(section => {
    const stage = section.querySelector('.pres-stage');
    const panel = section.querySelector('.card-panel');
    if (!stage || !panel) return;
    const stageStickyTop = parseInt(getComputedStyle(stage).top) || 140;
    const stageH = stage.offsetHeight;
    const panelH = panel.offsetHeight;
    const portraitCenter = stageStickyTop + stageH / 2;
    panel.style.top = Math.max(10, portraitCenter - panelH / 2) + 'px';
  });
}
window.addEventListener('resize', alignCardPanels);

// ── DATA VIEW ──
function goToData() {
  document.getElementById('data-section-title').textContent = 'ALL DATA';

  // Merge both sections by president — combine stories under each president
  const merged = {};
  Object.keys(PRESIDENTS).forEach(sectionId => {
    PRESIDENTS[sectionId].forEach(p => {
      if (!merged[p.name]) {
        merged[p.name] = { name: p.name, termYears: p.termYears, stories: [] };
      }
      p.stories.forEach(s => merged[p.name].stories.push(s));
    });
  });

  // Keep presidents in original order, sort stories by date within each
  const presidents = Object.values(merged);
  presidents.forEach(p => {
    p.stories.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  });

  const container = document.getElementById('data-scroll');
  container.innerHTML = '';

  const totalPres = presidents.length;
  const beginEnd = Math.ceil(totalPres / 3);
  const midEnd = Math.ceil(2 * totalPres / 3);

  presidents.forEach((p, idx) => {
    const group = document.createElement('div');
    group.className = 'data-pres-group';
    if (idx === 0) group.id = 'era-beginning';
    if (idx === beginEnd) group.id = 'era-middle';
    if (idx === midEnd) group.id = 'era-end';

    const nameEl = document.createElement('div');
    nameEl.className = 'data-pres-name';
    nameEl.textContent = p.name;
    group.appendChild(nameEl);

    const termEl = document.createElement('div');
    termEl.className = 'data-pres-term';
    termEl.textContent = p.termYears;
    group.appendChild(termEl);

    const grid = document.createElement('div');
    grid.className = 'data-cards-grid';

    p.stories.forEach(s => {
      const card = document.createElement('div');
      card.className = 'story-card type-' + s.type;
      card.style.cursor = 'pointer';
      card.onclick = (function(story, name, term) { return function() { showDetail(story, name, term); }; })(s, p.name, p.termYears);
      card.innerHTML =
        '<div class="story-headline">' + s.headline + '</div>' +
        (s.body ? '<div class="story-body" style="display:block;font-size:clamp(10px,1.2vw,14px);color:#555;line-height:1.5;margin-top:8px;">' + s.body + '</div>' : '') +
        '<div class="story-meta-bottom">' +
          '<div class="smeta-source">' + s.source + '</div>' +
          '<div class="smeta-date">' + s.date + '</div>' +
          (s.page ? '<div class="smeta-page">' + s.page + '</div>' : '') +
          '<div class="smeta-link">Read More &rarr;</div>' +
        '</div>';
      grid.appendChild(card);
    });

    group.appendChild(grid);
    container.appendChild(group);
  });

  // Hide section chrome, nav, ruler
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('scroll-ruler').style.display = 'none';
  document.getElementById('section-chrome').style.display = 'none';

  showScreen('data-screen');
}

function scrollToEra(era) {
  const el = document.getElementById('era-' + era);
  if (el) {
    const scroll = document.getElementById('data-scroll');
    const headerH = document.querySelector('.data-header').offsetHeight;
    scroll.scrollTo({ top: el.offsetTop - headerH - 10, behavior: 'smooth' });
  }
}

function goBackFromData() {
  goToSection(currentSection);
}

// ── DETAIL VIEW ──
let detailReturnSection = null;

function showDetailByIndex(presIdx, storyIdx) {
  const presidents = getActivePresidents(currentSection);
  const p = presidents[presIdx];
  const s = p.stories[storyIdx];
  showDetail(s, p.name, p.termYears);
}

function showDetail(story, presName, presTermYears) {
  detailReturnSection = currentSection;
  const container = document.getElementById('detail-scroll');
  const v = story.type || 'neutral';
  const vClass = 'val-' + v;
  const vLabels = {positive:'Positive',negative:'Negative',neutral:'Neutral Coverage',sotu:'State of the Union'};

  let h = '';
  h += '<div class="detail-valence ' + vClass + '">' + (vLabels[v]||v) + '</div>';
  h += '<div class="detail-doc-title">' + (story.docTitle || story.headline) + '</div>';
  h += '<div class="detail-president">' + presName + ' &mdash; ' + presTermYears + '</div>';

  if (story.excerpt || story.body) {
    const raw = (story.excerpt || story.body).replace(/^"|"$/g, '');
    h += '<div class="detail-excerpt">&ldquo;' + raw + '&rdquo;</div>';
  }

  h += '<div class="detail-meta-grid">';
  const meta = [
    ['Date', story.date],
    ['Document Type', story.docType],
    ['Audience', story.audience],
    ['Source', story.source],
    ['Group Mentioned', story.groupMentioned || (story.page ? story.page.replace(/^Group:\s*/i,'') : null)],
    ['Group Category', story.groupCategory],
    ['Archive', story.archive],
  ];
  meta.forEach(function(pair) {
    if (pair[1] && pair[1] !== 'N/A') h += '<div class="detail-meta-item"><label>' + pair[0] + '</label><span>' + pair[1] + '</span></div>';
  });
  h += '</div>';

  if (story.context) {
    h += '<div class="detail-section-heading">Context</div>';
    h += '<div class="detail-text">' + story.context + '</div>';
  }

  if (story.notes) {
    h += '<div class="detail-section-heading">Notes</div>';
    h += '<div class="detail-text">' + story.notes + '</div>';
  }

  if (story.rights) {
    h += '<div class="detail-section-heading">Rights</div>';
    h += '<div class="detail-text" style="font-size:14px;color:#888;">' + story.rights + '</div>';
  }

  if (story.url && story.url !== 'N/A') {
    h += '<a class="detail-source-link" href="' + story.url + '" target="_blank" rel="noopener">View Original Source &nearr;</a>';
  }

  container.innerHTML = h;
  container.scrollTop = 0;
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('scroll-ruler').style.display = 'none';
  document.getElementById('section-chrome').style.display = 'none';
  showScreen('detail-screen');
}

function goBackFromDetail() {
  if (detailReturnSection) goToSection(detailReturnSection);
  else goToMap();
}

// ── MAP COVER FIT ──
function fitMapInner() {
  var wrapper = document.querySelector('.map-img-wrapper');
  var inner = document.getElementById('map-img-inner');
  if (!wrapper || !inner) return;
  var wW = wrapper.clientWidth, wH = wrapper.clientHeight;
  var imgRatio = 6401 / 3603; // natural map aspect ratio
  var containerRatio = wW / wH;
  var w, h;
  if (containerRatio > imgRatio) {
    w = wW; h = wW / imgRatio;
  } else {
    h = wH; w = wH * imgRatio;
  }
  inner.style.width = w + 'px';
  inner.style.height = h + 'px';
}
window.addEventListener('resize', fitMapInner);

// ── INIT: set image srcs from base64 ──

  document.getElementById('wh-img').src          = ASSET.whitehouse;
  document.getElementById('pp-img').src          = ASSET.peoplespark;
  fitMapInner();
});
