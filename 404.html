<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T/B/AA — To Be An American</title>
<script>
  // SPA deep-link bounce: GitHub Pages serves this for unknown paths.
  // We rewrite /map → /?/map and redirect to root, which the inline script
  // in index.html turns back into /map via history.replaceState.
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    '/?/' +
    l.pathname.slice(1).replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
